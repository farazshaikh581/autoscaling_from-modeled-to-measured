apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: factorizator
  namespace: factorizator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: factorizator
  minReplicas: 1
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 50
        periodSeconds: 30
    scaleUp:
      stabilizationWindowSeconds: 10
      policies:
      - type: Percent
        value: 100
        periodSeconds: 10
      - type: Pods
        value: 5
        periodSeconds: 10
      selectPolicy: Max
